# Project identification
sonar.projectKey=social-studio-app
sonar.projectName=Social Studio App
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=src
sonar.tests=src/__tests__
sonar.test.inclusions=src/__tests__/**/*.test.ts,src/__tests__/**/*.test.tsx

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=node_modules/**, .next/**, public/**, artifacts/**, .gemini/**

# TypeScript/JavaScript configuration
sonar.javascript.environments=browser,node
sonar.typescript.tsconfigPath=tsconfig.json

# Quality Gate and Security
sonar.security.qualitygate.enabled=true
sonar.cpd.exclusions=src/__tests__/**
